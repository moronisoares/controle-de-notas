name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControleDeNotas-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Controle de Notas - APK (última versão)
          body: |
            APK de depuração instalável do app Controle de Notas.
            Baixe o arquivo app-debug.apk no seu celular e instale
            (permita "instalar de fontes desconhecidas" se solicitado).
          files: app/build/outputs/apk/debug/app-debug.apk
